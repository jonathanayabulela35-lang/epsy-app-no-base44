name: Build Android App Bundle

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GRADLE_USER_HOME: ${{ github.workspace }}/.gradle

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Capacitor tools
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Initialize Capacitor
        run: npx cap init EpsyApp com.epsy.app --web-dir=dist

      - name: Add Android platform
        run: npx cap add android

      - name: Upgrade Gradle wrapper
        run: |
          sed -i 's/gradle-8.2.1-all.zip/gradle-8.5-all.zip/g' android/gradle/wrapper/gradle-wrapper.properties
          cat android/gradle/wrapper/gradle-wrapper.properties

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Prepare Gradle directory
        run: mkdir -p "$GITHUB_WORKSPACE/.gradle"

      - name: Build Android bundle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew --no-daemon bundleRelease --stacktrace

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: epsy-app-bundle
          path: android/app/build/outputs/bundle/release/*.aab
